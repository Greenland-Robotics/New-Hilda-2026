# AndroidX package structure to make it clearer which packages are bundled with the
# Android operating system, and which are packaged with your app's APK
# https://developer.android.com/topic/libraries/support-library/androidx-rn
android.useAndroidX=true

# We no longer need to auto-convert third-party libraries to use AndroidX, which slowed down the build
android.enableJetifier=false

# Allow Gradle to use up to 1 GB of RAM
org.gradle.jvmargs=-Xmx1024M

android.nonTransitiveRClass=false
# Windows file locking workaround for Gradle 8.9
org.gradle.parallel=false
org.gradle.workers.max=1
android.javaCompile.suppressSourceTargetDeprecationWarning=true

# Set environment variables
org.gradle.user.home=C:\\Users\\STEM\\gradle-home
org.gradle.java.home=C:\\Program Files\\Android\\Android Studio\\jbr

# Clean gradle wrapper distribution cache and build TeamCode debug APK
# Remove-Item -Recurse -Force "$env:GRADLE_USER_HOME\wrapper\dists"
# .\gradlew :TeamCode:assembleDebug

classpath 'com.android.tools.build:gradle:8.6.0'  // or try 8.8
